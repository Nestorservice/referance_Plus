# render.yaml
# Développé par OceanTechnologie
# Configuration de déploiement pour Render.com

services:
  # Base de données MariaDB / MySQL
  - type: pserv
    name: stocky-db
    env: docker
    dockerfilePath: ./Dockerfile.db
    plan: free
    envVars:
      - key: PORT
        value: 3306
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_DATABASE
        value: stocky_pos
      - key: MYSQL_USER
        value: stocky_user
      - key: MYSQL_PASSWORD
        generateValue: true

  # Application Laravel (Backend + Frontend)
  - type: web
    name: stocky-app
    env: docker
    dockerfilePath: ./Dockerfile.web
    plan: free
    envVars:
      - key: APP_NAME
        value: "Stocky POS"
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://stocky-app.onrender.com
      
      # Base de données
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService:
          name: stocky-db
          type: pserv
          property: host
      - key: DB_PORT
        value: 3306
      - key: DB_DATABASE
        fromService:
          name: stocky-db
          type: pserv
          envVarKey: MYSQL_DATABASE
      - key: DB_USERNAME
        fromService:
          name: stocky-db
          type: pserv
          envVarKey: MYSQL_USER
      - key: DB_PASSWORD
        fromService:
          name: stocky-db
          type: pserv
          envVarKey: MYSQL_PASSWORD

      # PWA & WebPush
      - key: VAPID_PUBLIC_KEY
        generateValue: true
      - key: VAPID_PRIVATE_KEY
        generateValue: true
      - key: VAPID_SUBJECT
        value: "mailto:contact@oceantechnologie.com"
