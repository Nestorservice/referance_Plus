server {
    listen 80;
    server_name 113.30.151.217;

    # Logs
    access_log /var/log/nginx/stocky_access.log;
    error_log /var/log/nginx/stocky_error.log;

    # Max upload size (important for product images/imports)
    client_max_body_size 64M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets support (if needed for updates/live features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_buffering off;
        proxy_read_timeout 600s;
    }
}
